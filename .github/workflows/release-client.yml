name: Release Client

on:
  push:
    tags:
      - 'client-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Client version (e.g. 1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build & publish ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Set version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        working-directory: client
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version --allow-same-version

      - name: Install deps
        working-directory: client
        run: npm install --no-audit --no-fund

      - name: Build & publish to GitHub Releases
        working-directory: client
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
